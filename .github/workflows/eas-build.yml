name: Build APK with EAS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # إزالة bun.lock لتجنب استخدام bun
      - name: Remove bun.lock if exists
        run: rm -f bun.lock

      # تنظيف التبعيات وإعادة تثبيتها باستخدام npm
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-package-lock

      # تثبيت وحدات Expo باستخدام npm
      - name: Install Expo modules
        run: npx expo install --npm

      # تثبيت EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # التحقق من وجود EXPO_TOKEN (خطوة تشخيص)
      - name: Debug EXPO_TOKEN
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "✅ EXPO_TOKEN is set (length: ${#EXPO_TOKEN})"
          else
            echo "❌ EXPO_TOKEN is NOT set"
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # بناء APK باستخدام EAS
      - name: Build APK with EAS
        run: npx eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # رفع APK كـ artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            *.apk
            **/build/outputs/apk/**/*.apk
